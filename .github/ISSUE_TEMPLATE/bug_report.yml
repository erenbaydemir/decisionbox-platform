name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure project with ...
        2. Trigger discovery ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Agent
        - API
        - Dashboard
        - LLM Provider
        - Warehouse Provider
        - Secret Provider
        - Domain Pack
        - Helm Charts
        - Terraform
        - Docker / docker-compose
        - Other
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Docker Compose
        - Kubernetes (Helm)
        - Local (make dev-*)
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details.
      placeholder: |
        - OS: Ubuntu 22.04
        - Go version: 1.25
        - Node version: 22
        - LLM Provider: claude
        - Warehouse Provider: bigquery

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant log output (will be rendered as code).
      render: shell
