name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'services/**'
              - 'libs/**'
              - 'providers/**'
              - 'domain-packs/**/go/**'
              - 'domain-packs/**/go.mod'
              - 'domain-packs/**/go.sum'
              - '.golangci.yml'
            dashboard:
              - 'ui/dashboard/**'

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/api/go.sum
            services/agent/go.sum

      - name: Build API
        run: cd services/api && go build -o ../../bin/decisionbox-api .

      - name: Build Agent
        run: cd services/agent && go build -o ../../bin/decisionbox-agent .

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/api/go.sum
            services/agent/go.sum

      - name: Test with coverage
        run: |
          COV="${GITHUB_WORKSPACE}/coverage"
          mkdir -p "$COV"
          (cd libs/go-common && go test -coverprofile="$COV/go-common.out" ./...)
          (cd domain-packs/gaming/go && go test -coverprofile="$COV/gaming.out" ./...)
          (cd domain-packs/social/go && go test -coverprofile="$COV/social.out" ./...)
          (cd providers/llm/claude && go test -coverprofile="$COV/llm-claude.out" ./...)
          (cd providers/llm/openai && go test -coverprofile="$COV/llm-openai.out" ./...)
          (cd providers/llm/ollama && go test -coverprofile="$COV/llm-ollama.out" ./...)
          (cd providers/llm/vertex-ai && go test -coverprofile="$COV/llm-vertex.out" ./...)
          (cd providers/llm/bedrock && go test -coverprofile="$COV/llm-bedrock.out" ./...)
          (cd providers/secrets/mongodb && go test -coverprofile="$COV/secrets-mongodb.out" ./...)
          (cd providers/secrets/gcp && go test -coverprofile="$COV/secrets-gcp.out" ./...)
          (cd providers/secrets/aws && go test -coverprofile="$COV/secrets-aws.out" ./...)
          (cd providers/warehouse/bigquery && go test -coverprofile="$COV/warehouse-bigquery.out" ./...)
          (cd providers/warehouse/redshift && go test -coverprofile="$COV/warehouse-redshift.out" ./...)
          (cd services/agent && go test -coverprofile="$COV/agent.out" ./...)
          (cd services/api && go test -coverprofile="$COV/api.out" ./...)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: coverage
          flags: go
          token: ${{ secrets.CODECOV_TOKEN }}

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/api/go.sum
            services/agent/go.sum

      - name: Lint go-common
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: libs/go-common

      - name: Lint gaming domain pack
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: domain-packs/gaming/go

      - name: Lint social domain pack
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: domain-packs/social/go

      - name: Lint Agent
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: services/agent

      - name: Lint API
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: services/api

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/dashboard/package-lock.json

      - name: Install dependencies
        run: cd ui/dashboard && npm ci

      - name: Build
        run: cd ui/dashboard && npm run build

  dashboard-test:
    name: Dashboard Test & Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/dashboard/package-lock.json

      - name: Install dependencies
        run: cd ui/dashboard && npm ci

      - name: Test with coverage
        run: cd ui/dashboard && npm test -- --coverage --coverageReporters=lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: ui/dashboard/coverage
          flags: dashboard
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Lint
        run: cd ui/dashboard && npm run lint

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true' || needs.detect-changes.outputs.dashboard == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/api/go.sum
            services/agent/go.sum

      - name: Install Grant
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grant/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Check Agent licenses
        run: grant check dir:services/agent -c .grant.yaml

      - name: Check API licenses
        run: grant check dir:services/api -c .grant.yaml

  # Optional: triggered by PR label or manual dispatch
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.go == 'true' &&
      (contains(github.event.pull_request.labels.*.name, 'run-integration-tests') || github.event_name == 'push')
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/api/go.sum
            services/agent/go.sum

      - name: Agent integration tests
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: decisionbox_test
        run: |
          (cd services/agent && go test -tags=integration -count=1 -timeout=5m .)
          (cd services/agent && go test -tags=integration -count=1 -timeout=5m ./internal/database/)

      - name: API integration tests
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: decisionbox_test
        run: cd services/api && go test -tags=integration -count=1 -timeout=5m .

      - name: Secrets provider integration tests
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: decisionbox_test
        run: cd providers/secrets/mongodb && go test -tags=integration -count=1 -timeout=5m ./...
