name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  ORG: decisionbox-io

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      agent: ${{ steps.filter.outputs.agent }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ""
          filters: |
            api:
              - 'services/api/**'
              - 'libs/**'
              - 'providers/**'
              - 'domain-packs/**'
            agent:
              - 'services/agent/**'
              - 'libs/**'
              - 'providers/**'
              - 'domain-packs/**'
            dashboard:
              - 'ui/dashboard/**'

  lint-dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.dashboard == 'true' || github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Lint API Dockerfile
        if: needs.detect-changes.outputs.api == 'true' || github.ref_type == 'tag'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/api/Dockerfile
          failure-threshold: error

      - name: Lint Agent Dockerfile
        if: needs.detect-changes.outputs.agent == 'true' || github.ref_type == 'tag'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/agent/Dockerfile
          failure-threshold: error

      - name: Lint Dashboard Dockerfile
        if: needs.detect-changes.outputs.dashboard == 'true' || github.ref_type == 'tag'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ui/dashboard/Dockerfile
          failure-threshold: error

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-dockerfiles]
    if: always() && needs.lint-dockerfiles.result != 'failure'
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: decisionbox-api
            context: .
            dockerfile: services/api/Dockerfile
            changed: ${{ needs.detect-changes.outputs.api }}
          - service: decisionbox-agent
            context: .
            dockerfile: services/agent/Dockerfile
            changed: ${{ needs.detect-changes.outputs.agent }}
          - service: decisionbox-dashboard
            context: ui/dashboard
            dockerfile: ui/dashboard/Dockerfile
            changed: ${{ needs.detect-changes.outputs.dashboard }}

    steps:
      - name: Skip if unchanged
        if: matrix.changed != 'true' && github.ref_type != 'tag'
        run: echo "No changes for ${{ matrix.service }}, skipping" && exit 0

      - uses: actions/checkout@v4
        if: matrix.changed == 'true' || github.ref_type == 'tag'

      - uses: docker/setup-buildx-action@v3
        if: matrix.changed == 'true' || github.ref_type == 'tag'

      - name: Docker metadata
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Save image as artifact
        if: (matrix.changed == 'true' || github.ref_type == 'tag') && github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          docker save -o /tmp/${{ matrix.service }}.tar $TAGS

      - name: Upload image artifact
        if: (matrix.changed == 'true' || github.ref_type == 'tag') && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp/${{ matrix.service }}.tar
          retention-days: 1

  security:
    name: Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: always() && needs.build.result == 'success' && github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: decisionbox-api
            changed: ${{ needs.detect-changes.outputs.api }}
          - service: decisionbox-agent
            changed: ${{ needs.detect-changes.outputs.agent }}
          - service: decisionbox-dashboard
            changed: ${{ needs.detect-changes.outputs.dashboard }}

    steps:
      - name: Skip if unchanged
        if: matrix.changed != 'true' && github.ref_type != 'tag'
        run: echo "No changes for ${{ matrix.service }}, skipping" && exit 0

      - name: Download image artifact
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp

      - name: Load image
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        run: docker load -i /tmp/${{ matrix.service }}.tar

      - name: Generate SBOM with Syft
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service }}:${{ github.ref_name }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.service }}
          output-file: sbom-${{ matrix.service }}.spdx.json
        env:
          SYFT_GOLANG_SEARCH_LOCAL_MOD_CACHE_LICENSES: true
          SYFT_GOLANG_MAIN_MODULE_VERSION_FROM_BUILD_SETTINGS: true

      - name: Upload SBOM artifact
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

      - name: Scan vulnerabilities with Grype
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        uses: anchore/scan-action@v6
        id: grype
        with:
          sbom: sbom-${{ matrix.service }}.spdx.json
          output-format: sarif
          fail-build: 'false'
          severity-cutoff: critical

      - name: Upload Grype scan results
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: 'grype-${{ matrix.service }}'

      - name: Check license compliance with Grant
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grant/main/install.sh | sh -s -- -b /usr/local/bin
          PACKAGES=$(jq '.packages | length' sbom-${{ matrix.service }}.spdx.json)
          echo "SBOM packages: $PACKAGES"
          if [ "${PACKAGES:-0}" -eq 0 ]; then
            echo "Skipping license check (0 packages)"
            exit 0
          fi
          grant check sbom:sbom-${{ matrix.service }}.spdx.json -c .grant.yaml

  push:
    name: Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, build, security]
    if: always() && needs.security.result == 'success' && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: decisionbox-api
            changed: ${{ needs.detect-changes.outputs.api }}
          - service: decisionbox-agent
            changed: ${{ needs.detect-changes.outputs.agent }}
          - service: decisionbox-dashboard
            changed: ${{ needs.detect-changes.outputs.dashboard }}

    steps:
      - name: Skip if unchanged
        if: matrix.changed != 'true' && github.ref_type != 'tag'
        run: echo "No changes for ${{ matrix.service }}, skipping" && exit 0

      - name: Download image artifact
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp

      - name: Load image
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        run: docker load -i /tmp/${{ matrix.service }}.tar

      - name: Login to GHCR
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: matrix.changed == 'true' || github.ref_type == 'tag'
        run: docker push --all-tags ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service }}
