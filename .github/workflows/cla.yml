name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, 'I have read the CLA'))
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: "cla-signatures.json"
          path-to-document: "https://github.com/decisionbox-io/decisionbox-platform/blob/main/CLA.md"
          remote-organization-name: decisionbox-io
          remote-repository-name: decisionbox-platform
          branch: cla-signatures
          allowlist: dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign the [Contributor License Agreement](https://github.com/decisionbox-io/decisionbox-platform/blob/main/CLA.md).

            **To sign**, please comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

            The CLA only applies to code contributions. You retain full copyright to your work. This is a one-time process — once signed, all your future PRs are covered.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA. Thank you!"
          lock-pullrequest-aftermerge: false
          use-dco-flag: false
