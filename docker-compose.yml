services:
  mongodb:
    image: mongo:7.0
    container_name: decisionbox-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: decisionbox
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: decisionbox-api
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=decisionbox
      - PORT=8080
      # Agent only needs LLM_API_KEY as secret (everything else from project config in MongoDB)
      - LLM_API_KEY=${LLM_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ui/dashboard
      dockerfile: Dockerfile
    container_name: decisionbox-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongodb_data:
