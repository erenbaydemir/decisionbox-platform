codecov:
  notify:
    after_n_builds: 1

ignore:
  - "services/api/main.go"
  - "services/api/apiserver/apiserver.go"      # startup/wiring — tested by integration tests
  - "services/agent/main.go"
  - "services/agent/agentserver/agentserver.go" # startup/wiring — tested by integration tests

coverage:
  status:
    project:
      default:
        target: auto
    patch:
      default:
        target: auto

flags:
  go:
    paths:
      - libs/
      - services/
      - providers/
      - domain-packs/
    carryforward: true
  integration:
    paths:
      - libs/
      - services/
      - providers/
    carryforward: true
  dashboard:
    paths:
      - ui/dashboard/
    carryforward: true
