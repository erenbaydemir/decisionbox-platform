{{- if and (not (index .Values "mongodb" "enabled")) (not (index .Values.env "MONGODB_URI")) (not (index .Values.extraEnv "MONGODB_URI")) (not .Values.extraEnvFrom) }}
{{- fail "mongodb.enabled is false but no MONGODB_URI provided. Set env.MONGODB_URI, extraEnv.MONGODB_URI, or extraEnvFrom with a secretRef." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "decisionbox-api.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "decisionbox-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "decisionbox-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "decisionbox-api.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccountName }}
      serviceAccountName: {{ .Values.serviceAccountName }}
      {{- end }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "decisionbox-api.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- if index .Values "mongodb" "enabled" }}
      initContainers:
        - name: wait-for-mongodb
          image: docker.io/busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "decisionbox-api.fullname" . }}-mongodb 27017; do echo "Waiting for MongoDB..."; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ include "decisionbox-api.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.qdrant.enabled }}
            - name: QDRANT_URL
              value: {{ .Values.qdrant.url | default (printf "%s-qdrant:6334" (include "decisionbox-api.fullname" .)) | quote }}
            {{- if .Values.qdrant.apiKey }}
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "decisionbox-api.fullname" . }}-qdrant
                  key: api-key
            {{- end }}
            {{- end }}
            {{- if index .Values "mongodb" "enabled" }}
            - name: MONGODB_URI
              {{- if index .Values "mongodb" "auth" "enabled" }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "decisionbox-api.fullname" . }}-mongodb-uri
                  key: mongodb-uri
              {{- else }}
              value: {{ include "decisionbox-api.mongodbURI" . | quote }}
              {{- end }}
            {{- end }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: {{ .Values.livenessProbe.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: {{ .Values.readinessProbe.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
