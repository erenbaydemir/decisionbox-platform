{{- if and .Values.qdrant.enabled .Values.qdrant.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "decisionbox-api.fullname" . }}-qdrant
  labels:
    {{- include "decisionbox-api.labels" . | nindent 4 }}
type: Opaque
data:
  api-key: {{ .Values.qdrant.apiKey | b64enc | quote }}
{{- end }}
