version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - gosec
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
    presets:
      - std-error-handling
